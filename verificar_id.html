<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Civil Digital - Xochitlamapan</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --jade: #0B4A3F; --vino: #631123; --crema: #F4F1EA; --oro: #D4AF37; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--crema); margin: 0; padding: 0; color: #333; }
        header { background: white; border-bottom: 4px solid var(--vino); padding: 15px; position: relative; overflow: hidden; text-align: center; }
        .bandera-img { position: absolute; top: 0; width: 80px; opacity: 0.8; }
        .izq { left: 0; }
        .der { right: 0; transform: scaleX(-1); }
        header a { color: var(--jade); text-decoration: none; font-weight: bold; font-size: 0.8rem; position: relative; z-index: 2; border: 1px solid var(--jade); padding: 5px 10px; border-radius: 4px; }

        .container { max-width: 500px; margin: 20px auto; padding: 15px; }
        .opciones-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; text-align: center; font-size: 1rem; text-transform: uppercase; }
        .btn-accion { background: var(--vino); color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        
        #reader { width: 100%; border-radius: 10px; overflow: hidden; border: 2px solid var(--vino) !important; display: none; margin-top: 15px; }
        
        .card { background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); border: 1px solid #ddd; overflow: hidden; display: none; margin-top: 20px; }
        .card-header { background: var(--vino); color: white; padding: 20px; text-align: center; }
        .status-id { background: #2e7d32; color: white; padding: 12px; font-weight: bold; text-align: center; }
        .row { border-bottom: 1px solid #eee; padding: 10px 15px; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .label { color: #888; text-transform: uppercase; font-weight: bold; font-size: 0.7rem; }
        .value { font-weight: bold; color: #111; text-align: right; word-break: break-all; margin-left: 10px; }
    </style>
</head>
<body>

<header>
    <img src="bandera.png" class="bandera-img izq">
    <img src="bandera.png" class="bandera-img der">
    <a href="identidad.html">← VOLVER A IDENTIDAD</a>
</header>

<div class="container">
    <div id="selector-box" class="opciones-box">
        <h3 style="color: var(--vino); margin-top: 0;">CONSULTA JURISDICCIONAL</h3>
        <p style="font-size: 0.8rem; color: #666;">Búsqueda por CUA, CIEC, CURC o Escaneo QR</p>
        
        <input type="text" id="manualInput" placeholder="INGRESE CLAVE DE BÚSQUEDA">
        <button class="btn-accion" onclick="validarManual()">CONSULTAR REGISTRO</button>
        <button class="btn-accion" style="background:var(--jade);" onclick="iniciarCamara()">📷 USAR CÁMARA</button>
        
        <div id="reader"></div>
    </div>

    <div id="resultado-card" class="card">
        <div class="card-header">
            <h3 style="margin:0; font-size: 1rem;">IDENTIDAD INTEGRAL VALIDADA</h3>
            <small>Gobierno Originario Xochitlamapan</small>
        </div>
        <div class="status-id">✅ DOCUMENTO VÁLIDO</div>
        <div class="content" style="padding: 10px 0;">
            <div id="datos-id"></div>
            <div style="background: #fdfaf0; border-left: 4px solid var(--oro); padding: 10px; margin: 15px; font-size: 0.7rem; text-align: justify;">
                <strong>ESTATUS JURÍDICO:</strong> Personalidad Jurídica Originaria ratificada por la SCJN (AR 782/2024). Inmunidad Diplomática Cultural Activa.
            </div>
            <div style="padding: 0 15px 15px;">
                <button class="btn-accion" style="background:#666;" onclick="location.href='verificar_id.html'">NUEVA CONSULTA</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- PADRÓN DE LA COMUNIDAD (TODOS LOS MIEMBROS) ---
    const REGISTRO_IDENTIDAD = {
        "XOC-IDCC-2024-F1-P05-CL0002-A-0002": {
            n: "Macani Tlamatini, Jose",
            curc: "MATJ750826HOCCLS92",
            ciec: "MATJ750826X16",
            sn: "057720",
            t: "Integrante Originario Diplomático Cultural"
        },
        "XOC-IDCC-2024-F1-P05-CL0002-B-0001": {
            n: "Pablo Hernández, Mariela",
            curc: "PAHM910826MVZBRR94",
            ciec: "PAHM910826X14",
            sn: "419121",
            t: "Integrante Originario Diplomático Cultural"
        },
        "XOC-IDCC-2024-F1-P05-CL002-0001": {
            n: "Macani Tlamatini, Jose",
            curc: "000000000000000000",
            ciec: "00000000000",
            sn: "419121",
            t: "Integrante Originario Diplomático Cultural"
        },
        "XOC-IDCC-2025-F1-P07-CL0002-A-0001": {
            n: "Kuikakoatl, Roberto",
            curc: "KUXR800123HDFKXB95",
            ciec: "KUXR800123X16",
            sn: "419131",
            t: "Integrante Originario Diplomático Cultural"
        }
    };

    function mostrarCard(data, cua) {
        const container = document.getElementById('datos-id');
        container.innerHTML = `
            <div class="row"><div class="label">Nombre:</div><div class="value">${data.n}</div></div>
            <div class="row"><div class="label">CUA:</div><div class="value">${cua}</div></div>
            <div class="row"><div class="label">CURC:</div><div class="value">${data.curc}</div></div>
            <div class="row"><div class="label">CIEC:</div><div class="value">${data.ciec}</div></div>
            <div class="row"><div class="label">Serie Holograma:</div><div class="value">${data.sn}</div></div>
            <div class="row"><div class="label">Estatus:</div><div class="value">${data.t}</div></div>
            <div class="row"><div class="label">Vigencia:</div><div class="value">PERMANENTE</div></div>
        `;
        document.getElementById('resultado-card').style.display = 'block';
        document.getElementById('selector-box').style.display = 'none';
        if (window.scannerActivo) window.scannerActivo.stop();
    }

    // --- FUNCIÓN DE BÚSQUEDA INTELIGENTE (ELIMINA EL ERROR DE "NO ENCONTRADO") ---
    function buscarProcesar(textoRecibido) {
        if (!textoRecibido) return;
        const texto = textoRecibido.trim().toUpperCase();

        // 1. ¿El texto ES exactamente un CUA de la lista?
        if (REGISTRO_IDENTIDAD[texto]) {
            mostrarCard(REGISTRO_IDENTIDAD[texto], texto);
            return;
        }

        // 2. ¿El texto CONTIENE algún CUA de nuestra lista? (Para URLs de QR)
        for (let cua in REGISTRO_IDENTIDAD) {
            if (texto.includes(cua)) {
                mostrarCard(REGISTRO_IDENTIDAD[cua], cua);
                return;
            }
        }

        // 3. ¿El texto coincide con alguna CURC o CIEC?
        const porDatos = Object.keys(REGISTRO_IDENTIDAD).find(key => 
            (REGISTRO_IDENTIDAD[key].curc && REGISTRO_IDENTIDAD[key].curc.toUpperCase() === texto) || 
            (REGISTRO_IDENTIDAD[key].ciec && REGISTRO_IDENTIDAD[key].ciec.toUpperCase() === texto)
        );

        if (porDatos) {
            mostrarCard(REGISTRO_IDENTIDAD[porDatos], porDatos);
            return;
        }

        alert("REGISTRO NO LOCALIZADO\nVerifique la clave o el código QR.");
    }

    // --- MOTOR AUTOMÁTICO AL CARGAR ---
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        // Si el link trae ?folio=... lo procesa
        if (urlParams.has('folio')) {
            buscarProcesar(urlParams.get('folio'));
        } 
        // Si no trae folio, pero trae datos V1.0 (?n=...)
        else if (urlParams.has('n')) {
            mostrarCard({
                n: urlParams.get('n').replace(/-/g, ' '),
                curc: urlParams.get('curc') || "N/A",
                ciec: urlParams.get('ciec') || "N/A",
                sn: urlParams.get('sn') || "N/A",
                t: urlParams.get('t') || "Integrante Originario"
            }, "REGISTRO V1.0");
        }
    };

    function validarManual() {
        const val = document.getElementById('manualInput').value;
        buscarProcesar(val);
    }

    function iniciarCamara() {
        document.getElementById('reader').style.display = 'block';
        window.scannerActivo = new Html5Qrcode("reader");
        window.scannerActivo.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, 
        (text) => {
            buscarProcesar(text);
        }).catch(err => alert("Cámara no disponible."));
    }
</script>
</body>
</html>
