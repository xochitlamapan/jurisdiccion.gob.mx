<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación Soberana | Xochitlamapan</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --jade: #0B4A3F; --vino: #631123; --crema: #F4F1EA; --oro: #D4AF37; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--crema); margin: 0; padding: 0; color: #333; }
        
        header { background: white; border-bottom: 5px solid var(--jade); padding: 20px 15px; text-align: center; position: relative; }
        .bandera-img { position: absolute; top: 0; width: 80px; opacity: 0.9; }
        .izq { left: 0; }
        .der { right: 0; transform: scaleX(-1); }
        .escudo { width: 70px; position: relative; z-index: 1; }
        
        .container { max-width: 500px; margin: 20px auto; padding: 15px; }
        
        .opciones-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border: 1px solid #ddd; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ccc; border-radius: 5px; box-sizing: border-box; text-align: center; font-size: 1rem; text-transform: uppercase; }
        .btn-accion { background: var(--jade); color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; font-size: 0.8rem; }
        .btn-vino { background: var(--vino); }
        
        #reader { width: 100%; border-radius: 10px; overflow: hidden; border: 2px solid var(--jade) !important; display: none; margin-top: 15px; background: #000; }
        
        .card { background: white; border-radius: 15px; box-shadow: 0 15px 50px rgba(0,0,0,0.3); border: 1px solid #ddd; overflow: hidden; display: none; margin-top: 5px; animation: aparece 0.3s ease-out; }
        @keyframes aparece { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .status-header { background: #2e7d32; color: white; padding: 15px; font-weight: bold; text-align: center; font-size: 1.1rem; letter-spacing: 1px; }
        .card-header { background: var(--vino); color: white; padding: 15px; text-align: center; font-size: 0.8rem; }
        
        .row { border-bottom: 1px solid #eee; padding: 12px 15px; display: flex; justify-content: space-between; font-size: 0.95rem; align-items: center; }
        .label { color: #888; text-transform: uppercase; font-weight: bold; font-size: 0.65rem; text-align: left; min-width: 80px; }
        .value { font-weight: bold; color: #111; text-align: right; word-break: break-all; margin-left: 10px; }
        
        .legal-footer { background: #fdfaf0; border-left: 4px solid var(--oro); padding: 15px; margin: 15px; font-size: 0.7rem; text-align: justify; line-height: 1.4; color: #444; }

        .btn-group { display: flex; gap: 10px; padding: 0 15px 15px; }
        .btn-flex { flex: 1; margin-bottom: 0; }
        
        #loading { display: none; color: var(--jade); font-weight: bold; margin: 20px; text-align: center; }
    </style>
</head>
<body>

<header id="main-header">
    <img src="bandera.png" class="bandera-img izq">
    <img src="bandera.png" class="bandera-img der">
    <img src="logo.png" class="escudo">
    <h1 style="color:var(--jade); font-size: 1rem; margin: 5px 0 0 0; letter-spacing: 1px;">SISTEMA DE VERIFICACIÓN</h1>
</header>

<div class="container">
    <div id="loading">PROCESANDO VALIDACIÓN SOBERANA...</div>

    <div id="selector-box" class="opciones-box">
        <h3 style="color: var(--vino); margin-top: 0; font-size: 1rem;">CONSULTA MANUAL</h3>
        <input type="text" id="manualInput" placeholder="CUA, CIEC O CURC">
        <button class="btn-accion" onclick="buscarProcesar(document.getElementById('manualInput').value)">VERIFICAR</button>
        <button class="btn-accion btn-vino" onclick="iniciarCamara()">📷 USAR CÁMARA</button>
        <div id="reader"></div>
    </div>

    <!-- TARJETA DE RESULTADO -->
    <div id="resultado-card" class="card">
        <div class="status-header">✅ DOCUMENTO VERIFICADO</div>
        <div class="card-header">
            IDENTIDAD INTEGRAL SOBERANA<br>
            <small>Pueblo Originario Xochitlamapan</small>
        </div>
        
        <div id="datos-id"></div>

        <div class="legal-footer">
            <strong>FUNDAMENTO:</strong> Jurisdicción Originaria ratificada por la SCJN (Sentencias 782/2024 y 344/2025). Inmunidad Diplomática Cultural Activa.
        </div>
        
        <div class="btn-group">
            <button class="btn-accion btn-flex" style="background:#666;" onclick="window.location.href='verificar_id.html'">NUEVA CONSULTA</button>
            <button class="btn-accion btn-flex" onclick="window.location.href='index.html'">🏠 IR AL PORTAL</button>
        </div>
    </div>
</div>

<script>
    // --- PADRÓN SOBERANO ---
    const REGISTRO_IDENTIDAD = {
        "XOC-IDCC-2025-F1-P07-CL0002-A-0001": { n: "Kuikakoatl, Roberto", curc: "KUXR800123HDFKXB95", ciec: "KUXR800123X16", sn: "419131", t: "Integrante Originario Diplomático Cultural" },
        "XOC-IDCC-2024-F1-P05-CL0002-A-0002": { n: "Macani Tlamatini, Jose", curc: "MATJ750826HOCCLS92", ciec: "MATJ750826X16", sn: "419111", t: "Integrante Originario" },
        "XOC-IDCC-2024-F1-P05-CL0002-B-0001": { n: "Pablo Hernández, Mariela", curc: "PAHM910826MVZBRR94", ciec: "PAHM910826X14", sn: "419121", t: "Integrante Originario" }
    };

    function mostrarCard(data, cua) {
        const container = document.getElementById('datos-id');
        container.innerHTML = `
            <div class="row"><div class="label">Nombre:</div><div class="value">${data.n}</div></div>
            <div class="row"><div class="label">CUA:</div><div class="value">${cua}</div></div>
            <div class="row"><div class="label">CURC:</div><div class="value">${data.curc}</div></div>
            <div class="row"><div class="label">CIEC:</div><div class="value">${data.ciec}</div></div>
            <div class="row"><div class="label">Holograma:</div><div class="value">${data.sn}</div></div>
        `;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('selector-box').style.display = 'none';
        document.getElementById('resultado-card').style.display = 'block';
        
        // Ocultar header solo si entramos por QR para que la tarjeta sea la protagonista
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('folio')) {
            document.getElementById('main-header').style.display = 'none';
        }
    }

    function buscarProcesar(textoRecibido) {
        if (!textoRecibido) return;
        const q = textoRecibido.trim().toUpperCase();

        let encontrado = false;
        for (let cua in REGISTRO_IDENTIDAD) {
            if (q.includes(cua) || cua.includes(q)) {
                mostrarCard(REGISTRO_IDENTIDAD[cua], cua);
                encontrado = true;
                break;
            }
        }

        if (!encontrado) {
            const id = Object.keys(REGISTRO_IDENTIDAD).find(k => q.includes(REGISTRO_IDENTIDAD[k].curc) || q.includes(REGISTRO_IDENTIDAD[k].ciec));
            if (id) {
                mostrarCard(REGISTRO_IDENTIDAD[id], id);
            } else if (!window.location.search.includes('folio')) {
                alert("REGISTRO NO LOCALIZADO");
            }
        }
    }

    // AUTO-ARRANQUE
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const folio = urlParams.get('folio');
        if (folio) {
            document.getElementById('loading').style.display = 'block';
            setTimeout(() => { buscarProcesar(folio); }, 150);
        }
    })();

    function iniciarCamara() {
        document.getElementById('reader').style.display = 'block';
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, 
        (text) => {
            if (text.includes('folio=')) {
                buscarProcesar(text.split('folio=')[1].split('&')[0]);
            } else {
                buscarProcesar(text);
            }
            scanner.stop();
        }).catch(err => alert("Error de cámara."));
    }
</script>
</body>
</html>
